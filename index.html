<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas del Día (Firebase)</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #007BFF;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .nota {
            background: #eef;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Mis Notas del Día (Firebase)</h1>
    <textarea id="notaInput" placeholder="Escribe tu nota aquí..."></textarea>
    <button onclick="guardarNota()">Guardar Nota</button>
    <div id="listaNotas"></div>
</div>

<script>
    // 🔥 Configuración Firebase
    const firebaseConfig = {
        databaseURL: "https://paginaweb2-d9d4d-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const notasRef = db.ref("notas");

    // Guardar nota
    function guardarNota() {
        const input = document.getElementById('notaInput');
        const nota = input.value.trim();

        if (nota === '') {
            alert('Por favor escribe una nota.');
            return;
        }

        notasRef.push({
            texto: nota,
            fecha: new Date().toLocaleString()
        });

        input.value = '';
    }

    // Mostrar notas en tiempo real
    notasRef.on('value', (snapshot) => {
        const lista = document.getElementById('listaNotas');
        lista.innerHTML = '';

        snapshot.forEach((child) => {
            const data = child.val();
            const key = child.key;

            const div = document.createElement('div');
            div.className = 'nota';
            div.innerHTML = `
                <strong>${data.fecha}</strong><br>
                ${data.texto}<br>
                <button onclick="eliminarNota('${key}')">Eliminar</button>
            `;
            lista.appendChild(div);
        });
    });

    // Eliminar nota
    function eliminarNota(key) {
        notasRef.child(key).remove();
    }
</script>

</body>
</html>
