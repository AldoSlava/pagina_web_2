<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas del Día</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #007BFF;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .nota {
            background: #eef;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Mis Notas del Día</h1>
    <textarea id="notaInput" placeholder="Hola Jonatahn escribe tu nota aquí..."></textarea>
    <button onclick="guardarNota()">Guardar Nota</button>
    <div id="listaNotas"></div>
</div>

<script>
    function guardarNota() {
        const input = document.getElementById('notaInput');
        const nota = input.value.trim();

        if (nota === '') {
            alert('Por favor escribe una nota.');
            return;
        }

        let notas = JSON.parse(localStorage.getItem('notas')) || [];
        notas.push({ texto: nota, fecha: new Date().toLocaleString() });
        localStorage.setItem('notas', JSON.stringify(notas));

        input.value = '';
        mostrarNotas();
    }

    function mostrarNotas() {
        const lista = document.getElementById('listaNotas');
        lista.innerHTML = '';

        let notas = JSON.parse(localStorage.getItem('notas')) || [];

        notas.forEach((n, index) => {
            const div = document.createElement('div');
            div.className = 'nota';
            div.innerHTML = `<strong>${n.fecha}</strong><br>${n.texto}<br><button onclick="eliminarNota(${index})">Eliminar</button>`;
            lista.appendChild(div);
        });
    }

    function eliminarNota(index) {
        let notas = JSON.parse(localStorage.getItem('notas')) || [];
        notas.splice(index, 1);
        localStorage.setItem('notas', JSON.stringify(notas));
        mostrarNotas();
    }

    window.onload = mostrarNotas;
</script>

</body>
</html>
